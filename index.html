<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#FBF1EA">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Lila">
<title>Lila</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css?v=13">
</head>
<body>
  <main id="app"></main>

  <nav class="nav">
    <button data-act="nav" data-id="today">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.5 5.5l1.4 1.4M16.9 16.9l1.6 1.6M18.5 5.5l-1.6 1.6M7.1 16.9l-1.6 1.6"/></svg>
      Dzisiaj
    </button>
    <button data-act="nav" data-id="world">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11l8-6 8 6M6 10v9h12v-9"/></svg>
      Świat
    </button>
    <button data-act="nav" data-id="journey">
      <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 3.5l2.6 5.3 5.9.9-4.3 4.1 1 5.8L12 17l-5.2 2.6 1-5.8L3.5 9.7l5.9-.9z"/></svg>
      Podróż
    </button>
    <button data-act="nav" data-id="habits">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20l1-4 11-11 3 3-11 11z"/></svg>
      Nawyki
    </button>
  </nav>

  <div id="toast" class="toast"></div>
  <div id="scrim" class="scrim"></div>

  <div id="celebrate-overlay" onclick="hideCelebrateVideo()">
    <video id="celebrate-video" src="assets/lila/celebrate_loop.mp4"
           playsinline muted preload="auto"></video>
  </div>

  <div id="breath-overlay">
    <div class="breath-bg"><img src="assets/cafe/tea_scene.png" alt=""></div>
    <div class="breath-inner">
      <div class="breath-circle"><span class="breath-label">Wdech</span></div>
      <p class="breath-hint">Zamknij oczy i oddychaj z nami 🤍</p>
    </div>
    <div class="breath-prog"><div class="breath-prog-i"></div></div>
    <button class="breath-close" data-act="breath-stop">Zakończ</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/cloud-config.js?v=1"></script>
  <script src="js/cloud.js?v=1"></script>
  <script src="js/app.js?v=14"></script>
</body>
</html>
